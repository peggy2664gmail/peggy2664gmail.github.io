<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13141a;
      --border: rgba(255,255,255,0.07);
      --accent-update: #00e5a0;
      --accent-config: #ff6b35;
      --text-primary: #f0f0f0;
      --text-muted: #6b7280;
      --glow-update: rgba(0, 229, 160, 0.25);
      --glow-config: rgba(255, 107, 53, 0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,229,160,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 70%, rgba(255,107,53,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeDown 0.7s ease both;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .eyebrow::before, .eyebrow::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--text-muted);
      opacity: 0.5;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      background: linear-gradient(135deg, #f0f0f0 30%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* Card container */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    /* Button card */
    .btn-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      padding: 2.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-decoration: none;
      color: var(--text-primary);
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
    }

    .btn-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    /* Update card accent */
    .btn-card.update::before {
      background: radial-gradient(ellipse 80% 60% at 50% 100%, var(--glow-update), transparent);
    }
    .btn-card.update:hover {
      border-color: rgba(0,229,160,0.4);
      box-shadow: 0 0 40px var(--glow-update), 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-4px);
    }
    .btn-card.update:hover::before { opacity: 1; }

    /* Config card accent */
    .btn-card.config::before {
      background: radial-gradient(ellipse 80% 60% at 50% 100%, var(--glow-config), transparent);
    }
    .btn-card.config:hover {
      border-color: rgba(255,107,53,0.4);
      box-shadow: 0 0 40px var(--glow-config), 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-4px);
    }
    .btn-card.config:hover::before { opacity: 1; }

    /* Icon circle */
    .icon-wrap {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s ease;
    }

    .btn-card:hover .icon-wrap { transform: scale(1.1); }

    .update .icon-wrap {
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.2);
    }
    .config .icon-wrap {
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.2);
    }

    .icon-wrap svg { width: 26px; height: 26px; }
    .update .icon-wrap svg { stroke: var(--accent-update); }
    .config .icon-wrap svg  { stroke: var(--accent-config); }

    /* Label */
    .btn-label {
      position: relative;
      z-index: 1;
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .update .btn-label { color: var(--accent-update); }
    .config .btn-label  { color: var(--accent-config); }

    /* Sub-label */
    .btn-sub {
      position: relative;
      z-index: 1;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.4;
    }

    /* Arrow indicator */
    .btn-arrow {
      position: relative;
      z-index: 1;
      margin-top: 0.25rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s ease, background 0.22s ease;
    }
    .update .btn-arrow { background: rgba(0,229,160,0.08); }
    .config .btn-arrow  { background: rgba(255,107,53,0.08); }
    .btn-card:hover .btn-arrow { transform: translate(3px, -3px); }
    .btn-arrow svg { width: 14px; height: 14px; }
    .update .btn-arrow svg { stroke: var(--accent-update); }
    .config .btn-arrow svg  { stroke: var(--accent-config); }

    /* Footer */
    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* RWD — single column on small screens */
    @media (max-width: 480px) {
      .cards {
        grid-template-columns: 1fr;
        max-width: 360px;
      }
      .btn-card {
        padding: 2rem 1.25rem;
        flex-direction: row;
        justify-content: flex-start;
        gap: 1.1rem;
        text-align: left;
      }
      .btn-sub { display: none; }
      .btn-arrow { margin-top: 0; margin-left: auto; }
    }

    /* Active / tap state */
    .btn-card:active { transform: translateY(0) scale(0.97); }
  </style>
</head>
<body>
  <div class="wrapper">

    <header class="header">
      <p class="eyebrow">Control Panel</p>
      <h1>Dashboard</h1>
      <p>Select an action to proceed</p>
    </header>

    <div class="cards">

      <!-- Update Button -->
      <a class="btn-card update"
         href="https://kentaitwds2.app.n8n.cloud/form/170c6857-0af8-4c7d-b6d2-f85aec5a8839"
         target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <!-- Upload / refresh icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <span class="btn-label">Update</span>
        <span class="btn-sub">Submit form &amp; push data</span>
        <div class="btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>
      </a>

      <!-- Config Button -->
      <a class="btn-card config"
         href="https://docs.google.com/spreadsheets/d/18ABRXEks-LDbf3_Z7inx7VzQOUi52kKh9d4QEn21PDc/edit?usp=sharing"
         target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          <!-- Settings / sliders icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
            <circle cx="8"  cy="6"  r="2" fill="none"/>
            <circle cx="16" cy="12" r="2" fill="none"/>
            <circle cx="8"  cy="18" r="2" fill="none"/>
          </svg>
        </div>
        <span class="btn-label">Config</span>
        <span class="btn-sub">Edit spreadsheet settings</span>
        <div class="btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>
      </a>

    </div>

    <p class="footer">All links open in a new tab</p>

  </div>
</body>
</html>
